# IITG Sustainability Capstone & ML Challenge Configuration

data:
  train_data_path: "project/data/public_trip_data.csv"
  train_attributes_path: "project/data/public_trip_event_attributes.csv"
  train_log_path: "project/data/public_trip_event_log.csv"
  test_data_path: "project/data/private_trip_data.csv"
  test_attributes_path: "project/data/private_trip_event_attributes.csv"
  test_log_path: "project/data/private_trip_event_log.csv"
  sample_submission_path: "project/data/sample_submission.csv"

features:
  target_col: "HighCarbon"
  prohibited_leakage_cols:
    - "Departure_CO2e"
    - "Return_CO2e"
    - "Hotel_CO2e"
    - "Spend_CO2e"
    - "TotalCO2e"
    - "HighCarbon"
  categorical_cols:
    - "DepartureLocationCountry"
    - "DepartureLocationCity"
    - "ArrivalLocationCountry"
    - "ArrivalLocationCity"
    - "ShippingTypeDescription"
    - "Purpose"
    - "OutOfPolicy"
    - "BusinessUnit"
    - "ProcessCode"
    - "NewTransportSelection"
    - "ReasonForNewTransport"
    - "NewHotelSelection"
    - "ReasonForNewHotel"
    - "NewModeOfTransportation"
    - "ReasonForTransportationChange"
    - "ReasonForDelay"

training:
  n_splits: 5
  random_state: 42
  early_stopping_rounds: 50
  optuna_trials: 10
  optuna_timeout: 600

models:
  xgboost:
    n_estimators: 1000
    learning_rate: 0.03
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    tree_method: "hist"
  lightgbm:
    n_estimators: 1000
    learning_rate: 0.03
    max_depth: 6
    num_leaves: 31
    subsample: 0.8
    colsample_bytree: 0.8
  catboost:
    iterations: 1000
    learning_rate: 0.03
    depth: 6
    eval_metric: "AUC"
    verbose: false

outputs:
  submission_dir: "project/submission"
  models_dir: "project/models"
  plots_dir: "project/outputs"
  logs_dir: "project/outputs"
